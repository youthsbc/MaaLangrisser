name: install

env:
  # Leave empty to use the latest release discovered from GitHub.
  MAAFW_VERSION: ""
  MXU_VERSION: ""

on:
  push:
    tags:
      - "v*"
    branches:
      - "**"
    paths:
      - ".github/workflows/install.yml"
      - "assets/**"
      - "agent/**"
      - "tools/**"
  pull_request:
    branches:
      - "**"
    paths:
      - ".github/workflows/install.yml"
      - "assets/**"
      - "agent/**"
      - "tools/**"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read

jobs:
  meta:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: set_tag
        run: |
          is_release=${{ startsWith(github.ref, 'refs/tags/v') }}
          tag=$(git describe --tags --match "v*" ${{ github.ref }} || true)
          if [[ $tag != v* ]]; then
            tag=$(curl -sX GET "https://api.github.com/repos/${{ github.repository }}/releases/latest" --header 'authorization: Bearer ${{ secrets.GITHUB_TOKEN }}' | awk '/tag_name/{print $4}' FS='["]')
            if [[ $tag != v* ]]; then
              tag="v0.0.0"
            fi
            tag=$(date "+$tag-%y%m%d-$(git rev-parse --short HEAD)")
          fi

          if [[ "$is_release" != "true" ]]; then
            prefix=${tag%-*-*}
            suffix=${tag#$prefix-}
            tag="$prefix-ci.$suffix"
          fi

          is_prerelease=false
          if [[ $tag =~ .*alpha.* || $tag =~ .*beta.* || $tag =~ .*rc.* || $tag =~ .*dev.* || $tag =~ .*-ci.* ]]; then
            is_prerelease=true
            echo "This is a pre-release version"
          fi

          echo tag=$tag | tee -a $GITHUB_OUTPUT
          echo is_release=$is_release | tee -a $GITHUB_OUTPUT
          echo is_prerelease=$is_prerelease | tee -a $GITHUB_OUTPUT

      - id: maafw-latest-release
        if: env.MAAFW_VERSION == ''
        uses: pozetroninc/github-action-get-latest-release@master
        with:
          repository: MaaXYZ/MaaFramework
          excludes: draft
          token: ${{ secrets.GITHUB_TOKEN }}

      - id: mxu-latest-release
        if: env.MXU_VERSION == ''
        uses: pozetroninc/github-action-get-latest-release@master
        with:
          repository: MistEO/MXU
          excludes: ${{ (steps.set_tag.outputs.is_release == 'true' && steps.set_tag.outputs.is_prerelease == 'false') && 'prerelease, draft' || 'draft' }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - id: resolve_versions
        run: |
          maafw_version="${MAAFW_VERSION:-${{ steps.maafw-latest-release.outputs.release }}}"
          mxu_version="${MXU_VERSION:-${{ steps.mxu-latest-release.outputs.release }}}"

          echo maafw_version=$maafw_version | tee -a $GITHUB_OUTPUT
          echo mxu_version=$mxu_version | tee -a $GITHUB_OUTPUT

    outputs:
      tag: ${{ steps.set_tag.outputs.tag }}
      is_release: ${{ steps.set_tag.outputs.is_release }}
      is_prerelease: ${{ steps.set_tag.outputs.is_prerelease }}
      maafw_version: ${{ steps.resolve_versions.outputs.maafw_version }}
      mxu_version: ${{ steps.resolve_versions.outputs.mxu_version }}

  build_and_install:
    needs: meta
    runs-on: ${{ matrix.os == 'win' && 'windows-latest' || (matrix.os == 'macos' && 'macos-latest' || 'ubuntu-latest') }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: win
            arch: x86_64
          - os: win
            arch: aarch64
          - os: macos
            arch: x86_64
          - os: macos
            arch: aarch64
          - os: linux
            arch: x86_64

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Download MaaFramework
        uses: robinraju/release-downloader@v1
        with:
          repository: MaaXYZ/MaaFramework
          fileName: "MAA-${{ matrix.os }}-${{ matrix.arch }}*"
          tag: ${{ needs.meta.outputs.maafw_version }}
          out-file-path: "deps"
          extract: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download MXU
        uses: robinraju/release-downloader@v1
        with:
          repository: MistEO/MXU
          fileName: "MXU-${{ matrix.os }}-${{ matrix.arch }}-*"
          tag: ${{ needs.meta.outputs.mxu_version }}
          out-file-path: "downloads/MXU"
          extract: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare MXU executable
        shell: bash
        run: |
          mxu_binary="$(find downloads/MXU -type f \( -iname 'mxu.exe' -o -name 'mxu' \) | head -n 1)"
          if [[ -z "$mxu_binary" ]]; then
            echo "MXU executable was not found in the downloaded archive."
            find downloads/MXU -maxdepth 3 -type f
            exit 1
          fi

          if [[ "${{ matrix.os }}" == "win" ]]; then
            cp "$mxu_binary" ./mxu.exe
          else
            cp "$mxu_binary" ./mxu
            chmod +x ./mxu
          fi

      - name: Install
        shell: bash
        run: |
          cd tools/
          python -m pip install -r ./requirements.txt
          python ./install.py ${{ needs.meta.outputs.tag }} ${{ matrix.os }} ${{ matrix.arch }}
          cd ..

      - uses: actions/upload-artifact@v4
        with:
          name: MaaLangrisser-${{ matrix.os }}-${{ matrix.arch }}-intermediate
          path: install

  package_linux_tarball:
    needs: [meta, build_and_install]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64]

    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: MaaLangrisser-linux-${{ matrix.arch }}-intermediate
          path: install

      - name: Repackage as tar.gz
        shell: bash
        run: |
          chmod +x install/MaaLangrisser || true
          find install/maafw -type f -name "Maa*" ! -name "*.so" -exec chmod +x {} \; || true
          cd install
          tar -czvf ../MaaLangrisser-linux-${{ matrix.arch }}-${{ needs.meta.outputs.tag }}.tar.gz .

      - uses: actions/upload-artifact@v4
        with:
          name: MaaLangrisser-linux-${{ matrix.arch }}-tarball
          path: MaaLangrisser-linux-${{ matrix.arch }}-${{ needs.meta.outputs.tag }}.tar.gz

  package_macos_dmg:
    needs: [meta, build_and_install]
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [aarch64, x86_64]

    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: MaaLangrisser-macos-${{ matrix.arch }}-intermediate
          path: install

      - name: Package DMG
        shell: bash
        run: |
          brew install create-dmg

          app_name="MaaLangrisser.app"
          mkdir -p "$app_name/Contents/MacOS"
          mkdir -p "$app_name/Contents/Resources"
          cp -R install/* "$app_name/Contents/MacOS/"

          full_version="${{ needs.meta.outputs.tag }}"
          short_version="$(echo "$full_version" | sed -E 's/^v//; s/-.*//')"
          cat > "$app_name/Contents/Info.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleInfoDictionaryVersion</key>
            <string>6.0</string>
            <key>CFBundleExecutable</key>
            <string>MaaLangrisser</string>
            <key>CFBundleIdentifier</key>
            <string>com.youthsbc.maalangrisser</string>
            <key>CFBundleName</key>
            <string>MaaLangrisser</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>$short_version</string>
            <key>CFBundleVersion</key>
            <string>$full_version</string>
            <key>LSMinimumSystemVersion</key>
            <string>10.13</string>
          </dict>
          </plist>
          EOF

          chmod +x "$app_name/Contents/MacOS/MaaLangrisser"
          find "$app_name/Contents/MacOS/maafw" -type f -name "Maa*" ! -name "*.dylib" -exec chmod +x {} \; || true
          codesign --force --deep --sign - "$app_name"

          create-dmg \
            --volname "MaaLangrisser Installer" \
            --window-pos 200 120 \
            --window-size 800 400 \
            --icon-size 100 \
            --icon "$app_name" 200 190 \
            --hide-extension "$app_name" \
            --app-drop-link 600 185 \
            "MaaLangrisser-macos-${{ matrix.arch }}-${{ needs.meta.outputs.tag }}.dmg" \
            "$app_name"

      - uses: actions/upload-artifact@v4
        with:
          name: MaaLangrisser-macos-${{ matrix.arch }}-dmg
          path: MaaLangrisser-macos-${{ matrix.arch }}-${{ needs.meta.outputs.tag }}.dmg

  package_win_zip:
    needs: [meta, build_and_install]
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [aarch64, x86_64]

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: MaaLangrisser-win-${{ matrix.arch }}-intermediate
          path: install

      - name: Package ZIP
        shell: pwsh
        run: |
          Compress-Archive -Path install/* -DestinationPath MaaLangrisser-win-${{ matrix.arch }}-${{ needs.meta.outputs.tag }}.zip

      - uses: actions/upload-artifact@v4
        with:
          name: MaaLangrisser-win-${{ matrix.arch }}-zip
          path: MaaLangrisser-win-${{ matrix.arch }}-${{ needs.meta.outputs.tag }}.zip

  changelog:
    name: Generate changelog
    needs: meta
    runs-on: ubuntu-latest
    outputs:
      release_body: ${{ steps.git-cliff.outputs.content }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate a changelog
        uses: orhun/git-cliff-action@v4
        id: git-cliff
        with:
          config: .github/cliff.toml
          args: >-
            -vv --latest --strip header
            ${{ needs.meta.outputs.is_prerelease == 'false' && '--tag-pattern "^v[0-9]+\\.[0-9]+\\.[0-9]+$"' || '' }}
        env:
          OUTPUT: CHANGES.md
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    if: ${{ needs.meta.outputs.is_release == 'true' }}
    needs:
      - meta
      - package_linux_tarball
      - package_macos_dmg
      - package_win_zip
      - changelog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: MaaLangrisser-*-zip
          path: artifacts

      - uses: actions/download-artifact@v4
        with:
          pattern: MaaLangrisser-*-tarball
          path: artifacts

      - uses: actions/download-artifact@v4
        with:
          pattern: MaaLangrisser-*-dmg
          path: artifacts

      - name: Prepare release artifacts
        shell: bash
        run: |
          find artifacts -mindepth 2 -type f -exec mv {} artifacts/ \;
          find artifacts -mindepth 1 -type d -empty -delete
          ls -la artifacts

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          tag_name: ${{ needs.meta.outputs.tag }}
          body: ${{ needs.changelog.outputs.release_body }}
          draft: false
          prerelease: ${{ needs.meta.outputs.is_prerelease == 'true' }}

      - name: Trigger MirrorChyanUploading
        if: false
        shell: bash
        run: |
          gh workflow run --repo $GITHUB_REPOSITORY mirrorchyan_release.yml -f tag=${{ needs.meta.outputs.tag }}
          gh workflow run --repo $GITHUB_REPOSITORY mirrorchyan_release_note.yml -f tag=${{ needs.meta.outputs.tag }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
